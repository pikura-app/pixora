<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c62a47"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>

  <!-- Subtle top gloss -->
  <rect width="256" height="128" rx="52" ry="52" fill="url(#glow)"/>

  <!-- P letter body -->
  <!-- Vertical stem -->
  <rect x="62" y="60" width="28" height="136" rx="6" fill="white"/>

  <!-- Top horizontal bar of P -->
  <rect x="62" y="60" width="88" height="28" rx="6" fill="white"/>

  <!-- Middle horizontal bar of P -->
  <rect x="62" y="118" width="84" height="28" rx="6" fill="white"/>

  <!-- Right curve of P (rounded cap) -->
  <rect x="122" y="60" width="28" height="86" rx="14" fill="white"/>

  <!-- Download arrow — accent color -->
  <!-- Arrow shaft -->
  <rect x="148" y="148" width="14" height="46" rx="5" fill="url(#accent)"/>

  <!-- Arrow head (chevron) -->
  <polygon points="141,178 155,200 169,178" fill="url(#accent)" rx="4"/>

  <!-- Small pixel dots — decorative -->
  <rect x="196" y="60"  width="10" height="10" rx="2" fill="#e94560" opacity="0.7"/>
  <rect x="196" y="78"  width="10" height="10" rx="2" fill="#e94560" opacity="0.4"/>
  <rect x="214" y="60"  width="10" height="10" rx="2" fill="#e94560" opacity="0.4"/>
</svg>
