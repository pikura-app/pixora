name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill this out. Please search existing issues before submitting.

  - type: input
    id: version
    attributes:
      label: Pikura Version
      description: Found in Settings → About
      placeholder: "1.7.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: |
        Paste relevant lines from your log file here.
        - Windows: `%AppData%\Pikura\pikura.log`
        - Linux: `~/.config/Pikura/pikura.log`
        - macOS: `~/Library/Application Support/Pikura/pikura.log`
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, crash reports, anything else useful.
