name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained Windows x64
        run: |
          dotnet publish src/Pixora.Avalonia/Pixora.Avalonia.csproj `
            -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/win-x64
        shell: pwsh

      - name: Create portable ZIP
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath publish/Pixora-${{ github.ref_name }}-windows-portable.zip
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Build installer
        run: iscc tools/installer/pixora.iss /DMyAppVersion=${{ github.ref_name }}
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            publish/Pixora-*-windows-portable.zip
            publish/Pixora-*-Setup.exe

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained macOS x64
        run: |
          dotnet publish src/Pixora.Avalonia/Pixora.Avalonia.csproj \
            -c Release -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/osx-x64

      - name: Bundle .app
        run: |
          APP=publish/Pixora.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp publish/osx-x64/Pixora "$APP/Contents/MacOS/Pixora"
          chmod +x "$APP/Contents/MacOS/Pixora"
          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>Pixora</string>
            <key>CFBundleExecutable</key><string>Pixora</string>
            <key>CFBundleIdentifier</key><string>com.pixora.app</string>
            <key>CFBundleVersion</key><string>${{ github.ref_name }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF

      - name: Create DMG
        run: |
          hdiutil create -volname Pixora \
            -srcfolder publish/Pixora.app \
            -ov -format UDZO \
            publish/Pixora-${{ github.ref_name }}-macos.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: publish/Pixora-*-macos.dmg

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained Linux x64
        run: |
          dotnet publish src/Pixora.Avalonia/Pixora.Avalonia.csproj \
            -c Release -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/linux-x64

      - name: Create tar.gz
        run: |
          chmod +x publish/linux-x64/Pixora
          tar -czf publish/Pixora-${{ github.ref_name }}-linux-x64.tar.gz \
            -C publish/linux-x64 .

      - name: Build AppImage
        run: |
          sudo apt-get install -y libfuse2
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

          cp publish/linux-x64/Pixora AppDir/usr/bin/pixora
          chmod +x AppDir/usr/bin/pixora
          cp src/Pixora.Avalonia/Assets/pixora-logo.png AppDir/usr/share/icons/hicolor/256x256/apps/pixora.png
          cp src/Pixora.Avalonia/Assets/pixora-logo.png AppDir/pixora.png

          cat > AppDir/pixora.desktop <<EOF
          [Desktop Entry]
          Name=Pixora
          Exec=pixora
          Icon=pixora
          Type=Application
          Categories=Graphics;
          EOF

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          exec "$(dirname "$0")/usr/bin/pixora" "$@"
          EOF
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool AppDir publish/Pixora-${{ github.ref_name }}-linux-x86_64.AppImage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            publish/Pixora-*-linux-x64.tar.gz
            publish/Pixora-*-linux-x86_64.AppImage

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pixora ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/**/*
