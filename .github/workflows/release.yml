name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.0.x'

      # Strip the leading "v" from the git tag once and expose it as $env:VERSION
      # for every subsequent step. github.ref_name is "v1.7.0" but every artifact
      # filename (zip / installer / DMG / AppImage) should use the plain "1.7.0"
      # form so it lines up with the .NET assembly metadata and the Control Panel
      # display.
      - name: Compute version
        id: ver
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          echo "VERSION=$version" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Publish self-contained Windows x64
        run: |
          dotnet publish src/Pikura.Avalonia/Pikura.Avalonia.csproj `
            -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/win-x64
        shell: pwsh

      - name: Create portable ZIP
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath publish/Pikura-${{ env.VERSION }}-windows-portable.zip
        shell: pwsh

      - name: Install Inno Setup (with ISPP)
        run: |
          # Download Inno Setup + ISPP from the official GitHub release (includes ISPP)
          $url = "https://github.com/jrsoftware/issrc/releases/download/is-6_3_3/innosetup-6.3.3.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\issetup.exe" -UseBasicParsing
          Start-Process "$env:TEMP\issetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" -Wait
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Build installer
        run: iscc tools/installer/pikura.iss /DMyAppVersion=${{ env.VERSION }}
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: windows
          path: |
            publish/Pikura-*-windows-portable.zip
            publish/Pikura-*-Setup.exe

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /Library/Developer/CoreSimulator || true
          sudo rm -rf /Applications/Xcode_14*.app /Applications/Xcode_15*.app || true
          sudo rm -rf ~/Library/Caches || true
          df -h

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.0.x'

      # Same v-strip as the Windows job, just in bash. Exposed as $VERSION /
      # ${{ env.VERSION }} for every subsequent step so the DMG and arm64 zip
      # names match the Windows installer ("1.7.0", no leading "v").
      - name: Compute version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish self-contained macOS x64
        run: |
          dotnet publish src/Pikura.Avalonia/Pikura.Avalonia.csproj \
            -c Release -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/osx-x64

      - name: Publish self-contained macOS arm64
        run: |
          dotnet publish src/Pikura.Avalonia/Pikura.Avalonia.csproj \
            -c Release -r osx-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/osx-arm64

      - name: Bundle .app (universal binary)
        run: |
          APP=publish/Pikura.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          lipo -create publish/osx-x64/Pikura publish/osx-arm64/Pikura -output "$APP/Contents/MacOS/Pikura"
          chmod +x "$APP/Contents/MacOS/Pikura"

          # Generate .icns from PNG
          ICONSET=publish/Pikura.iconset
          mkdir -p "$ICONSET"
          SRC=src/Pikura.Avalonia/Assets/pikura-logo.png
          sips -z 16 16     "$SRC" --out "$ICONSET/icon_16x16.png"
          sips -z 32 32     "$SRC" --out "$ICONSET/icon_16x16@2x.png"
          sips -z 32 32     "$SRC" --out "$ICONSET/icon_32x32.png"
          sips -z 64 64     "$SRC" --out "$ICONSET/icon_32x32@2x.png"
          sips -z 128 128   "$SRC" --out "$ICONSET/icon_128x128.png"
          sips -z 256 256   "$SRC" --out "$ICONSET/icon_128x128@2x.png"
          sips -z 256 256   "$SRC" --out "$ICONSET/icon_256x256.png"
          sips -z 512 512   "$SRC" --out "$ICONSET/icon_256x256@2x.png"
          sips -z 512 512   "$SRC" --out "$ICONSET/icon_512x512.png"
          sips -z 1024 1024 "$SRC" --out "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/Pikura.icns"

          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          python3 tools/macos/write_plist.py "$VERSION" "$APP/Contents/Info.plist"
          codesign --force --deep --sign - "$APP"

      - name: Create DMG
        run: |
          # Use ditto to preserve permissions/symlinks inside the .app
          mkdir -p dmg_staging
          ditto publish/Pikura.app dmg_staging/Pikura.app
          hdiutil create -volname Pikura \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            publish/Pikura-${{ env.VERSION }}-macos.dmg

      - name: Create arm64 standalone zip
        run: |
          chmod +x publish/osx-arm64/Pikura
          codesign --force --sign - publish/osx-arm64/Pikura
          zip -j publish/Pikura-${{ env.VERSION }}-macos-arm64.zip publish/osx-arm64/Pikura

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: macos
          path: |
            publish/Pikura-*-macos.dmg
            publish/Pikura-*-macos-arm64.zip

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish self-contained Linux x64
        run: |
          dotnet publish src/Pikura.Avalonia/Pikura.Avalonia.csproj \
            -c Release -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/linux-x64

      - name: Create tar.gz
        run: |
          chmod +x publish/linux-x64/Pikura
          tar -czf publish/Pikura-${{ env.VERSION }}-linux-x64.tar.gz \
            -C publish/linux-x64 .

      - name: Build AppImage
        run: |
          sudo apt-get install -y libfuse2
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

          cp publish/linux-x64/Pikura AppDir/usr/bin/pikura
          chmod +x AppDir/usr/bin/pikura
          cp src/Pikura.Avalonia/Assets/pikura-logo.png AppDir/usr/share/icons/hicolor/256x256/apps/pikura.png
          cp src/Pikura.Avalonia/Assets/pikura-logo.png AppDir/pikura.png

          cat > AppDir/pikura.desktop <<EOF
          [Desktop Entry]
          Name=Pikura
          Exec=pikura
          Icon=pikura
          Type=Application
          Categories=Graphics;
          EOF

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          exec "$(dirname "$0")/usr/bin/pikura" "$@"
          EOF
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool AppDir publish/Pikura-${{ env.VERSION }}-linux-x86_64.AppImage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: linux
          path: |
            publish/Pikura-*-linux-x64.tar.gz
            publish/Pikura-*-linux-x86_64.AppImage

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for RELEASE_NOTES.md)
        uses: actions/checkout@v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pikura ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: artifacts/**/*
